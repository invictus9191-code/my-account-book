<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Finance - 가계부</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Scripts -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-apexcharts@1.4.1/dist/react-apexcharts.iife.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>

<body>
    <div id="root">
        <div style="color: white; padding: 20px; font-family: sans-serif;">화면을 불러오는 중입니다... (잠시만 기다려 주세요)</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const STORAGE_KEY = 'INV_HOUSEHOLD_DATA';
        const FIREBASE_CONFIG_KEY = 'INV_FIREBASE_CONFIG';
        const PASSWORD_KEY = 'INV_APP_PASSWORD';
        const DEFAULT_PASSWORD = '9999';

        const initialData = {
            owners: [{ id: 'o1', name: '홍길동' }],
            groups: [{ id: 'g1', name: '주거래' }],
            assets: [{ id: 'a1', ownerId: 'o1', groupId: 'g1', name: '현금', type: 'Cash', initialBalance: 0 }],
            categories: [
                { id: 'ex1', type: 'Expense', name: '식비' }, { id: 'ex2', type: 'Expense', name: '카페/간식' },
                { id: 'ex3', type: 'Expense', name: '외식/배달' }, { id: 'ex4', type: 'Expense', name: '생활용품' },
                { id: 'ex5', type: 'Expense', name: '교통' }, { id: 'ex6', type: 'Expense', name: '주거/통신' },
                { id: 'ex7', type: 'Expense', name: '건강' }, { id: 'ex8', type: 'Expense', name: '문화' },
                { id: 'ex9', type: 'Expense', name: '여행' }, { id: 'ex10', type: 'Expense', name: '교육' },
                { id: 'ex11', type: 'Expense', name: '경조사' }, { id: 'ex12', type: 'Expense', name: '대출' },
                { id: 'ex13', type: 'Expense', name: '부모님' }, { id: 'ex14', type: 'Expense', name: '미용' },
                { id: 'ex15', type: 'Expense', name: '용돈' }, { id: 'ex16', type: 'Expense', name: '기타' },
                { id: 'in1', type: 'Income', name: '급여' }, { id: 'in2', type: 'Income', name: '금융수입' },
                { id: 'in3', type: 'Income', name: '기타수입' }, { id: 'in4', type: 'Income', name: '보너스' },
                { id: 'tr1', type: 'Transfer', name: '저축' }, { id: 'tr2', type: 'Transfer', name: '이체' }
            ],
            transactions: []
        };

        const Icon = ({ name, size = 18 }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }}></i>;
        };

        const calculateAssetBalance = (assetId, assets, transactions) => {
            const asset = assets.find(a => a.id === assetId);
            if (!asset) return 0;
            const history = transactions.filter(t => t.assetId === assetId || t.toAssetId === assetId);
            return history.reduce((sum, t) => {
                const amt = Number(t.amount || 0);
                if (t.type === 'Income') return sum + amt;
                if (t.type === 'Expense') return sum - amt;
                if (t.type === 'Transfer') {
                    if (t.assetId === assetId) return sum - amt;
                    if (t.toAssetId === assetId) return sum + amt;
                }
                return sum;
            }, Number(asset.initialBalance || 0));
        };

        function Dashboard({ data }) {
            const stats = useMemo(() => {
                const now = new Date();
                const currentMonth = now.getMonth();
                const income = data.transactions.filter(t => t.type === 'Income' && new Date(t.date).getMonth() === currentMonth).reduce((s, t) => s + Number(t.amount), 0);
                const expense = data.transactions.filter(t => t.type === 'Expense' && new Date(t.date).getMonth() === currentMonth).reduce((s, t) => s + Number(t.amount), 0);
                const totalBalance = data.assets.reduce((sum, a) => sum + calculateAssetBalance(a.id, data.assets, data.transactions), 0);
                return { income, expense, balance: totalBalance };
            }, [data.transactions, data.assets]);

            const series = [{
                name: '수입',
                data: Array.from({ length: 12 }, (_, i) => data.transactions.filter(t => t.type === 'Income' && new Date(t.date).getMonth() === i).reduce((s, t) => s + Number(t.amount), 0))
            }, {
                name: '지출',
                data: Array.from({ length: 12 }, (_, i) => data.transactions.filter(t => t.type === 'Expense' && new Date(t.date).getMonth() === i).reduce((s, t) => s + Number(t.amount), 0))
            }];

            const options = {
                chart: { type: 'bar', toolbar: { show: false }, background: 'transparent' },
                theme: { mode: 'dark' },
                colors: ['#238636', '#da3633'],
                xaxis: { categories: ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'] },
                dataLabels: { enabled: false },
                grid: { borderColor: '#30363d' }
            };

            return (
                <div className="fade-in">
                    <h1 style={{ marginBottom: '1.5rem' }}>대시보드</h1>
                    <div className="dashboard-grid">
                        <div className="card stat-card"><span className="stat-label">이번 달 수입</span><span className="stat-value type-income">{stats.income.toLocaleString()}원</span></div>
                        <div className="card stat-card"><span className="stat-label">이번 달 지출</span><span className="stat-value type-expense">{stats.expense.toLocaleString()}원</span></div>
                        <div className="card stat-card"><span className="stat-label">전체 자산 총액</span><span className="stat-value">{stats.balance.toLocaleString()}원</span></div>
                    </div>
                    <div className="card"><h3>연간 흐름</h3>{window.ReactApexChart ? <window.ReactApexChart options={options} series={series} type="bar" height={300} /> : "차트를 로딩 중입니다..."}</div>
                </div>
            );
        }

        function TransactionPage({ data, setData, setEdit, setShowModal, syncToCloud }) {
            const del = (id) => {
                if (confirm('삭제하시겠습니까?')) {
                    const newData = { ...data, transactions: data.transactions.filter(t => t.id !== id) };
                    setData(newData);
                    syncToCloud(newData);
                }
            };

            const grouped = data.transactions.sort((a, b) => new Date(b.date) - new Date(a.date)).reduce((acc, t) => {
                const month = t.date.substring(0, 7); // YYYY-MM
                if (!acc[month]) acc[month] = { transactions: [], income: 0, expense: 0 };
                acc[month].transactions.push(t);
                if (t.type === 'Income') acc[month].income += Number(t.amount);
                else if (t.type === 'Expense') acc[month].expense += Number(t.amount);
                return acc;
            }, {});

            const sortedMonths = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

            return (
                <div className="fade-in">
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1rem', alignItems: 'center' }}>
                        <h1>거래 내역</h1><button className="primary" onClick={() => { setEdit(null); setShowModal(true); }}>+ 거래 추가</button>
                    </div>
                    <div className="card" style={{ overflowX: 'auto', padding: 0 }}>
                        <table className="transaction-table">
                            <thead><tr><th>날짜</th><th className="mobile-hide">구분</th><th>카테고리</th><th>금액</th><th className="mobile-hide">자산</th><th>메모</th></tr></thead>
                            <tbody>
                                {sortedMonths.map(month => {
                                    const [y, m] = month.split('-');
                                    const { transactions, income, expense } = grouped[month];
                                    return (
                                        <React.Fragment key={month}>
                                            <tr style={{ background: 'rgba(56, 139, 253, 0.1)', fontWeight: 'bold' }}>
                                                <td colSpan="6" style={{ padding: '0.5rem 1rem', fontSize: '1rem', color: '#58a6ff' }}>
                                                    [{y}년 {m}월]
                                                    <span style={{ marginLeft: '1rem', fontSize: '0.85rem' }}>
                                                        (수입: {income.toLocaleString()} / 지출: {expense.toLocaleString()} / 합계: {(income - expense).toLocaleString()})
                                                    </span>
                                                </td>
                                            </tr>
                                            {transactions.map(t => (
                                                <tr key={t.id} onClick={() => { setEdit(t); setShowModal(true); }} style={{ cursor: 'pointer' }}>
                                                    <td style={{ fontWeight: '500' }}>{new Date(t.date).getDate()}일</td>
                                                    <td className={`type-${t.type.toLowerCase()} mobile-hide`}>{t.type === 'Income' ? '수입' : t.type === 'Expense' ? '지출' : '이체'}</td>
                                                    <td>{data.categories.find(c => c.id === t.categoryId)?.name || '-'}</td>
                                                    <td style={{ fontWeight: '600' }} className={`type-${t.type.toLowerCase()}`}>{t.type === 'Expense' ? '-' : t.type === 'Income' ? '+' : ''}{Number(t.amount).toLocaleString()}</td>
                                                    <td className="mobile-hide">{t.type === 'Transfer' ? <span>{data.assets.find(a => a.id === t.assetId)?.name} → {data.assets.find(a => a.id === t.toAssetId)?.name}</span> : <span>{data.assets.find(a => a.id === t.assetId)?.name}</span>}</td>
                                                    <td><div style={{ maxWidth: '150px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{t.memo}</div></td>
                                                </tr>
                                            ))}
                                        </React.Fragment>
                                    );
                                })}
                                {data.transactions.length === 0 && <tr><td colSpan="6" style={{ textAlign: 'center', padding: '2rem' }}>거래 내역이 없습니다.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function AssetManagementPage({ data, setData, syncToCloud }) {
            const [newOwner, setNewOwner] = useState('');
            const [newGroup, setNewGroup] = useState('');
            const [newAsset, setNewAsset] = useState({ name: '', ownerId: '', groupId: '', type: 'Bank', initialBalance: '' });
            const [editingAsset, setEditingAsset] = useState(null);

            const addOwner = () => {
                if (!newOwner) return;
                const newData = { ...data, owners: [...data.owners, { id: Date.now().toString(), name: newOwner }] };
                setData(newData);
                syncToCloud(newData);
                setNewOwner('');
            };
            const addGroup = () => {
                if (!newGroup) return;
                const newData = { ...data, groups: [...(data.groups || []), { id: Date.now().toString(), name: newGroup }] };
                setData(newData);
                syncToCloud(newData);
                setNewGroup('');
            };
            const addAsset = () => {
                if (!newAsset.name || !newAsset.ownerId) return;
                const newData = { ...data, assets: [...data.assets, { ...newAsset, id: Date.now().toString(), initialBalance: Number(newAsset.initialBalance || 0) }] };
                setData(newData);
                syncToCloud(newData);
                setNewAsset({ name: '', ownerId: '', groupId: '', type: 'Bank', initialBalance: '' });
            };
            const updateAsset = () => {
                if (!editingAsset.name || !editingAsset.ownerId) return;
                const newData = { ...data, assets: data.assets.map(a => a.id === editingAsset.id ? { ...editingAsset, initialBalance: Number(editingAsset.initialBalance || 0) } : a) };
                setData(newData);
                syncToCloud(newData);
                setEditingAsset(null);
            };

            const delOwner = (id) => {
                if (confirm('소유자를 삭제하시겠습니까?')) {
                    const newData = { ...data, owners: data.owners.filter(o => o.id !== id) };
                    setData(newData);
                    syncToCloud(newData);
                }
            };
            const delGroup = (id) => {
                if (confirm('그룹을 삭제하시겠습니까?')) {
                    const newData = { ...data, groups: data.groups.filter(g => g.id !== id) };
                    setData(newData);
                    syncToCloud(newData);
                }
            };
            const delAsset = (id) => {
                if (confirm('자산을 삭제하시겠습니까?')) {
                    const newData = { ...data, assets: data.assets.filter(a => a.id !== id) };
                    setData(newData);
                    syncToCloud(newData);
                }
            };

            return (
                <div className="fade-in">
                    <h1 style={{ marginBottom: '1.5rem' }}>자산 관리</h1>
                    <div className="dashboard-grid">
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
                            <div className="card">
                                <h3>소유자 관리</h3>
                                <div style={{ display: 'flex', gap: '8px', margin: '1rem 0' }}><input value={newOwner} onChange={e => setNewOwner(e.target.value)} placeholder="이름" /><button className="primary" onClick={addOwner}>추가</button></div>
                                {data.owners.map(o => (<div key={o.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid #30363d' }}>{o.name} <button onClick={() => delOwner(o.id)} style={{ background: 'transparent', color: '#da3633', fontSize: '0.8rem' }}>삭제</button></div>))}
                            </div>
                            <div className="card">
                                <h3>그룹 관리</h3>
                                <div style={{ display: 'flex', gap: '8px', margin: '1rem 0' }}><input value={newGroup} onChange={e => setNewGroup(e.target.value)} placeholder="그룹명" /><button className="primary" onClick={addGroup}>추가</button></div>
                                {(data.groups || []).map(g => (<div key={g.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid #30363d' }}>{g.name} <button onClick={() => delGroup(g.id)} style={{ background: 'transparent', color: '#da3633', fontSize: '0.8rem' }}>삭제</button></div>))}
                            </div>
                        </div>
                        <div className="card" style={{ gridColumn: 'span 2' }}>
                            <h3>자산 목록 및 관리</h3>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr 1fr auto', gap: '8px', margin: '1rem 0', padding: '15px', background: '#0d1117', borderRadius: '8px', border: editingAsset ? '1px solid #58a6ff' : '1px solid #30363d' }}>
                                <input value={editingAsset ? editingAsset.name : newAsset.name} onChange={e => editingAsset ? setEditingAsset({ ...editingAsset, name: e.target.value }) : setNewAsset({ ...newAsset, name: e.target.value })} placeholder="자산명" />
                                <select value={editingAsset ? editingAsset.ownerId : newAsset.ownerId} onChange={e => editingAsset ? setEditingAsset({ ...editingAsset, ownerId: e.target.value }) : setNewAsset({ ...newAsset, ownerId: e.target.value })}><option value="">소유자 선택</option>{data.owners.map(o => <option key={o.id} value={o.id}>{o.name}</option>)}</select>
                                <select value={editingAsset ? editingAsset.groupId : newAsset.groupId} onChange={e => editingAsset ? setEditingAsset({ ...editingAsset, groupId: e.target.value }) : setNewAsset({ ...newAsset, groupId: e.target.value })}><option value="">그룹 선택</option>{(data.groups || []).map(g => <option key={g.id} value={g.id}>{g.name}</option>)}</select>
                                <input type="number" value={editingAsset ? editingAsset.initialBalance : newAsset.initialBalance} onChange={e => editingAsset ? setEditingAsset({ ...editingAsset, initialBalance: e.target.value }) : setNewAsset({ ...newAsset, initialBalance: e.target.value })} placeholder="초기 잔액" />
                                <select value={editingAsset ? editingAsset.type : newAsset.type} onChange={e => editingAsset ? setEditingAsset({ ...editingAsset, type: e.target.value }) : setNewAsset({ ...newAsset, type: e.target.value })}><option value="Cash">현금</option><option value="Bank">은행</option><option value="Card">카드</option></select>
                                {editingAsset ? (
                                    <div style={{ display: 'flex', gap: '4px' }}>
                                        <button className="primary" onClick={updateAsset}>저장</button>
                                        <button onClick={() => setEditingAsset(null)} style={{ background: '#30363d', color: 'white' }}>취소</button>
                                    </div>
                                ) : (
                                    <button className="primary" onClick={addAsset}>추가</button>
                                )}
                            </div>
                            <table>
                                <thead><tr><th>소유자</th><th>그룹명</th><th>자산명</th><th>유형</th><th>초기 금액</th><th>현재 잔액</th><th>관리</th></tr></thead>
                                <tbody>{data.assets.map(a => {
                                    const bal = calculateAssetBalance(a.id, data.assets, data.transactions);
                                    return (<tr key={a.id}><td>{data.owners.find(o => o.id === a.ownerId)?.name}</td><td>{data.groups?.find(g => g.id === a.groupId)?.name || '-'}</td><td>{a.name}</td><td>{a.type === 'Cash' ? '현금' : a.type === 'Bank' ? '은행' : '카드'}</td><td style={{ color: '#8b949e' }}>{Number(a.initialBalance || 0).toLocaleString()}원</td><td style={{ fontWeight: '600' }}>{bal.toLocaleString()}원</td><td><button onClick={() => setEditingAsset(a)} style={{ background: 'transparent', color: '#58a6ff', marginRight: '8px' }}>수정</button><button onClick={() => delAsset(a.id)} style={{ background: 'transparent', color: '#da3633' }}>삭제</button></td></tr>)
                                })}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function CategoryManagementPage({ data, setData, syncToCloud }) {
            const [newCat, setNewCat] = useState({ name: '', type: 'Expense' });
            const addCat = () => {
                if (!newCat.name) return;
                const newData = { ...data, categories: [...data.categories, { ...newCat, id: Date.now().toString() }] };
                setData(newData);
                syncToCloud(newData);
                setNewCat({ ...newCat, name: '' });
            };
            const delCat = (id) => {
                if (confirm('카테고리를 삭제하시겠습니까?')) {
                    const newData = { ...data, categories: data.categories.filter(c => c.id !== id) };
                    setData(newData);
                    syncToCloud(newData);
                }
            };
            const renderList = (type) => (
                <div className="card"><h3>{type === 'Income' ? '수입' : type === 'Expense' ? '지출' : '이체'}</h3><div style={{ display: 'flex', gap: '8px', margin: '1rem 0' }}><input value={newCat.type === type ? newCat.name : ''} onChange={e => setNewCat({ type, name: e.target.value })} placeholder="카테고리명" /><button className="primary" onClick={() => { if (newCat.type === type) addCat(); }}>추가</button></div>{data.categories.filter(c => c.type === type).map(c => (<div key={c.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid #30363d' }}>{c.name} <button onClick={() => delCat(c.id)} style={{ background: 'transparent', color: '#da3633', fontSize: '0.8rem' }}>삭제</button></div>))}</div>
            );
            return (<div className="fade-in"><h1 style={{ marginBottom: '1.5rem' }}>카테고리 관리</h1><div className="dashboard-grid">{renderList('Expense')}{renderList('Income')}{renderList('Transfer')}</div></div>);
        }

        function TransactionModal({ data, setData, onClose, editItem, syncToCloud }) {
            const [form, setForm] = useState(editItem || { date: new Date().toISOString().split('T')[0], type: 'Expense', amount: '', categoryId: '', ownerId: data.owners[0]?.id || '', assetId: data.assets[0]?.id || '', toAssetId: '', memo: '' });
            const filteredAssets = data.assets.filter(a => a.ownerId === form.ownerId);
            const filteredCategories = data.categories.filter(c => c.type === form.type);
            useEffect(() => {
                if (filteredAssets.length > 0 && !filteredAssets.find(a => a.id === form.assetId)) setForm(f => ({ ...f, assetId: filteredAssets[0].id }));
                if (form.type === 'Transfer' && !form.toAssetId && data.assets.length > 1) { const other = data.assets.find(a => a.id !== form.assetId); if (other) setForm(f => ({ ...f, toAssetId: other.id })); }
            }, [form.ownerId, form.type]);
            const handleSubmit = (e) => {
                if (e) e.preventDefault();
                if (form.type === 'Transfer' && form.assetId === form.toAssetId) { alert('동일 자산 간 이체는 불가합니다.'); return; }
                const newData = { ...data, transactions: editItem ? data.transactions.map(t => t.id === editItem.id ? { ...form, id: editItem.id } : t) : [...data.transactions, { ...form, id: Date.now().toString() }] };
                setData(newData);
                syncToCloud(newData);
                onClose();
            };
            const handleDelete = () => {
                if (confirm('이 거래 내역을 삭제하시겠습니까?')) {
                    const newData = { ...data, transactions: data.transactions.filter(t => t.id !== editItem.id) };
                    setData(newData);
                    syncToCloud(newData);
                    onClose();
                }
            };
            return (
                <div style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', background: 'rgba(0,0,0,0.8)', display: 'flex', justifyContent: 'center', alignItems: 'center', zIndex: 1000 }}>
                    <div className="card modal-content" style={{ maxWidth: '420px', width: '90%', padding: '2rem' }}>
                        <h2 style={{ marginBottom: '1.5rem', fontSize: '1.5rem' }}>거래 {editItem ? '수정' : '추가'}</h2>
                        <form onSubmit={handleSubmit}>
                            <div style={{ marginBottom: '1.2rem' }}><label>날짜</label><input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} required /></div>
                            <div style={{ marginBottom: '1.2rem' }}><label>구분</label><select value={form.type} onChange={e => setForm({ ...form, type: e.target.value })}><option value="Income">수입</option><option value="Expense">지출</option><option value="Transfer">이체</option></select></div>
                            <div style={{ marginBottom: '1.2rem' }}><label>카테고리</label><select value={form.categoryId} onChange={e => setForm({ ...form, categoryId: e.target.value })} required><option value="">선택하세요</option>{filteredCategories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
                            <div style={{ marginBottom: '1.2rem' }}><label>금액</label><input type="number" value={form.amount} onChange={e => setForm({ ...form, amount: e.target.value })} placeholder="금액 입력" required /></div>
                            <div style={{ marginBottom: '1.2rem' }}><label>소유자</label><select value={form.ownerId} onChange={e => setForm({ ...form, ownerId: e.target.value })}>{data.owners.map(o => <option key={o.id} value={o.id}>{o.name}</option>)}</select></div>
                            <div style={{ marginBottom: '1.2rem' }}><label>{form.type === 'Transfer' ? '출금 자산' : '자산'}</label><select value={form.assetId} onChange={e => setForm({ ...form, assetId: e.target.value })}>{filteredAssets.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
                            {form.type === 'Transfer' && <div style={{ marginBottom: '1.2rem' }}><label>입금 자산</label><select value={form.toAssetId} onChange={e => setForm({ ...form, toAssetId: e.target.value })}>{data.assets.filter(a => a.id !== form.assetId).map(a => <option key={a.id} value={a.id}>{a.name}</option>)}</select></div>}
                            <div style={{ marginBottom: '1.5rem' }}><label>메모</label><input value={form.memo} onChange={e => setForm({ ...form, memo: e.target.value })} placeholder="메모" /></div>
                            <div style={{ display: 'flex', gap: '8px', justifyContent: 'flex-end' }}>
                                <button type="button" onClick={onClose} style={{ background: '#30363d', color: 'white' }}>취소</button>
                                {editItem && <button type="button" className="danger" onClick={handleDelete}>삭제</button>}
                                <button type="submit" className="primary">저장</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function Settings({ data, setData, fbConfig, setFbConfig }) {
            const [fbVal, setFbVal] = useState(fbConfig ? JSON.stringify(fbConfig, null, 2) : '');
            const [newPw, setNewPw] = useState('');

            const saveFb = () => { try { const c = JSON.parse(fbVal); localStorage.setItem(FIREBASE_CONFIG_KEY, JSON.stringify(c)); setFbConfig(c); alert('Firebase 설정이 저장되었습니다. 앱을 다시 시작합니다.'); location.reload(); } catch (e) { alert('유효한 JSON 형식이 아닙니다.'); } };
            const resetFb = () => { if (confirm('서버 설정을 초기화하시겠습니까?')) { localStorage.removeItem(FIREBASE_CONFIG_KEY); setFbConfig(null); alert('설정이 초기화되었습니다.'); location.reload(); } };
            const changePw = () => { if (newPw.length < 4) { alert('비밀번호는 4자리 이상이어야 합니다.'); return; } localStorage.setItem(PASSWORD_KEY, newPw); setNewPw(''); alert('비밀번호가 변경되었습니다.'); };

            const exportData = () => { const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `household_backup_${new Date().toISOString().split('T')[0]}.json`; a.click(); };
            const importData = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const d = JSON.parse(ev.target.result); if (confirm('데이터를 덮어쓰시겠습니까? 현재 데이터는 사라집니다.')) { setData(d); alert('데이터를 성공적으로 불러왔습니다.'); } } catch (err) { alert('잘못된 백업 파일입니다.'); } }; reader.readAsText(file); };

            return (
                <div className="fade-in">
                    <h1 style={{ marginBottom: '1.5rem' }}>설정 및 데이터 관리</h1>
                    <div className="dashboard-grid">
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
                            <div className="card">
                                <h3>🔑 비밀번호 변경</h3>
                                <div style={{ display: 'flex', gap: '8px', margin: '1rem 0' }}>
                                    <input type="password" value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="새 비밀번호 입력" />
                                    <button className="primary" onClick={changePw}>변경</button>
                                </div>
                            </div>
                            <div className="card">
                                <h3>💾 데이터 백업 및 복구</h3>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginTop: '1rem' }}>
                                    <button onClick={exportData} style={{ background: '#30363d', color: 'white' }}><Icon name="download" size={16} /> JSON으로 내보내기</button>
                                    <label className="auth-btn login" style={{ textAlign: 'center', cursor: 'pointer' }}><Icon name="upload" size={16} /> 백업 파일 불러오기 <input type="file" accept=".json" onChange={importData} style={{ display: 'none' }} /></label>
                                </div>
                            </div>
                        </div>
                        <div className="card">
                            <h3>☁️ 서버 연동 (Firebase)</h3>
                            <p style={{ color: '#8b949e', fontSize: '0.85rem', marginBottom: '1rem' }}>Firebase 프로젝트 구성 JSON을 입력하세요.</p>
                            <textarea value={fbVal} onChange={e => setFbVal(e.target.value)} rows="8" style={{ width: '100%', marginBottom: '1rem', background: '#0d1117', color: '#8b949e', padding: '10px', fontSize: '13px', fontFamily: 'monospace' }} />
                            <div style={{ display: 'flex', gap: '8px' }}>
                                <button className="primary" onClick={saveFb}>저장</button>
                                <button onClick={resetFb} style={{ background: '#30363d', color: 'white' }}>기본값으로 초기화</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [data, setData] = useState(() => {
                const s = localStorage.getItem(STORAGE_KEY);
                if (!s) return initialData;
                const p = JSON.parse(s);
                if (!p.categories || p.categories.length < 10) p.categories = initialData.categories;
                if (!p.groups) p.groups = initialData.groups;
                if (p.assets) p.assets = p.assets.map(a => ({
                    ...a,
                    initialBalance: a.initialBalance !== undefined ? a.initialBalance : 0,
                    groupId: a.groupId || ''
                }));
                return p;
            });
            const [user, setUser] = useState(null);
            const [fbConfig, setFbConfig] = useState(() => JSON.parse(localStorage.getItem(FIREBASE_CONFIG_KEY) || 'null'));
            const [tab, setTab] = useState('dashboard');
            const [showModal, setShowModal] = useState(false);
            const [edit, setEdit] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [pullDistance, setPullDistance] = useState(0);
            const [startY, setStartY] = useState(0);
            const [isRefreshing, setIsRefreshing] = useState(false);

            useEffect(() => {
                const handleStart = (e) => {
                    if (window.scrollY === 0) setStartY(e.touches[0].pageY);
                };
                const handleMove = (e) => {
                    if (startY === 0) return;
                    const delta = e.touches[0].pageY - startY;
                    if (delta > 0 && window.scrollY === 0) {
                        setPullDistance(Math.min(delta * 0.4, 80));
                        if (delta > 50) e.preventDefault();
                    }
                };
                const handleEnd = () => {
                    if (pullDistance > 60) {
                        setIsRefreshing(true);
                        setTimeout(() => location.reload(), 500);
                    }
                    setPullDistance(0);
                    setStartY(0);
                };
                window.addEventListener('touchstart', handleStart, { passive: false });
                window.addEventListener('touchmove', handleMove, { passive: false });
                window.addEventListener('touchend', handleEnd);
                return () => {
                    window.removeEventListener('touchstart', handleStart);
                    window.removeEventListener('touchmove', handleMove);
                    window.removeEventListener('touchend', handleEnd);
                };
            }, [startY, pullDistance]);

            const syncToCloud = (newData) => {
                if (user && window.firebase && firebase.apps.length) {
                    firebase.firestore().collection('users').doc(user.uid).set(newData).catch(err => console.error("Firebase Sync Error:", err));
                }
            };

            useEffect(() => {
                if (!fbConfig || !window.firebase) return;
                if (!firebase.apps.length) firebase.initializeApp(fbConfig);
                const unsubscribe = firebase.auth().onAuthStateChanged(u => {
                    setUser(u);
                    if (u) {
                        firebase.firestore().collection('users').doc(u.uid).get().then(d => {
                            if (d.exists) setData(d.data());
                        });
                    }
                });
                return () => unsubscribe();
            }, [fbConfig]);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                if (window.lucide) window.lucide.createIcons();
            }, [data]);

            const menuClick = (t) => {
                if (t === 'settings') {
                    const pw = prompt('설정 페이지에 진입하려면 비밀번호를 입력하세요.');
                    const storedPw = localStorage.getItem(PASSWORD_KEY) || DEFAULT_PASSWORD;
                    if (pw !== storedPw) { alert('비밀번호가 올바르지 않습니다.'); return; }
                }
                setTab(t);
                setSidebarOpen(false);
            };

            return (
                <React.Fragment>
                    <div className="refresh-indicator" style={{ transform: `translateX(-50%) translateY(${pullDistance}px)`, opacity: pullDistance > 20 ? 1 : 0 }}>
                        {isRefreshing ? <Icon name="loader" size={20} className="spinner" /> : <Icon name="arrow-down" size={20} style={{ transform: `rotate(${pullDistance * 3}deg)` }} />}
                    </div>
                    <div className="mobile-header">
                        <button onClick={() => setSidebarOpen(true)} style={{ background: 'transparent', color: 'white', padding: '0.4rem' }}><Icon name="menu" size={24} /></button>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}><Icon name="activity" size={24} /><h2>Smart Finance</h2></div>
                    </div>
                    <div className={`mobile-overlay ${sidebarOpen ? 'visible' : ''}`} onClick={() => setSidebarOpen(false)}></div>
                    <div className={`sidebar ${sidebarOpen ? 'mobile-open' : ''}`}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '2rem' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}><Icon name="activity" size={24} /><h2>Smart Finance</h2></div>
                            <button className="mobile-only" onClick={() => setSidebarOpen(false)} style={{ background: 'transparent', color: 'white', display: window.innerWidth <= 768 ? 'block' : 'none' }}><Icon name="x" size={24} /></button>
                        </div>
                        <div className={`nav-item ${tab === 'dashboard' ? 'active' : ''}`} onClick={() => menuClick('dashboard')}><Icon name="layout-dashboard" /> 대시보드</div>
                        <div className={`nav-item ${tab === 'transactions' ? 'active' : ''}`} onClick={() => menuClick('transactions')}><Icon name="list" /> 거래 내역</div>
                        <div className={`nav-item ${tab === 'assets' ? 'active' : ''}`} onClick={() => menuClick('assets')}><Icon name="wallet" /> 자산 관리</div>
                        <div className={`nav-item ${tab === 'categories' ? 'active' : ''}`} onClick={() => menuClick('categories')}><Icon name="tags" /> 카테고리</div>
                        <div className={`nav-item ${tab === 'settings' ? 'active' : ''}`} onClick={() => menuClick('settings')}><Icon name="settings" /> 설정</div>
                        <div className="user-profile">{user ? <button onClick={() => firebase.auth().signOut()} className="auth-btn" style={{ background: 'transparent', color: '#8b949e' }}><Icon name="log-out" size={16} /> 로그아웃</button> : <button className="auth-btn login" onClick={() => { if (!fbConfig) setTab('settings'); else firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }}><Icon name="log-in" size={16} /> 로그인</button>}</div>
                    </div>
                    <div className="main-content"><div className="container">
                        {tab === 'dashboard' && <Dashboard data={data} />}
                        {tab === 'transactions' && <TransactionPage data={data} setData={setData} setEdit={setEdit} setShowModal={setShowModal} syncToCloud={syncToCloud} />}
                        {tab === 'assets' && <AssetManagementPage data={data} setData={setData} syncToCloud={syncToCloud} />}
                        {tab === 'categories' && <CategoryManagementPage data={data} setData={setData} syncToCloud={syncToCloud} />}
                        {tab === 'settings' && <Settings data={data} setData={setData} fbConfig={fbConfig} setFbConfig={setFbConfig} />}
                    </div></div>
                    {showModal && <TransactionModal data={data} setData={setData} onClose={() => { setShowModal(false); setEdit(null); }} editItem={edit} syncToCloud={syncToCloud} />}
                </React.Fragment>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
