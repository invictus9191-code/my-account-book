<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Finance - 가계부</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-apexcharts@1.4.1/dist/react-apexcharts.iife.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="pull-to-refresh-indicator" style="position: fixed; top: -60px; left: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; background: #f6f8fa; color: #57606a; z-index: 2000; transition: transform 0.2s; font-size: 0.9rem; font-weight: 500; border-bottom: 1px solid rgba(208, 215, 222, 0.8);">
        <span id="pull-to-refresh-text">↓ 당겨서 새로고침</span>
    </div>
    <div id="root">
        <div style="color: #24292f; padding: 20px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center;">
            <div id="loading-text">화면을 불러오는 중입니다. 잠시만 기다려 주세요...</div>
            <div id="error-display" style="display: none; color: #cf222e; margin-top: 20px; font-size: 0.9rem; background: #ffebe9; padding: 15px; border-radius: 8px; border: 1px solid rgba(208, 215, 222, 0.8); max-width: 90%; word-break: break-all;"></div>
            <button id="manual-reload" style="display: none; margin-top: 20px; padding: 10px 20px; background: #0969da; color: white; border-radius: 8px; border: none; font-weight: 600; cursor: pointer;" onclick="location.reload()">새로고침 하기</button>
            <button id="clear-storage" style="display: none; margin-top: 10px; padding: 10px 20px; background: #57606a; color: white; border-radius: 8px; border: none; font-weight: 600; cursor: pointer;" onclick="if(confirm('데이터를 초기화하시겠습니까? (저장된 정보가 삭제됩니다)')){localStorage.clear(); location.reload();}">데이터 초기화 후 새로고침</button>
        </div>
    </div>
    <script>
        // 에러 감지
        window.onerror = function(message, source, lineno, colno, error) {
            var display = document.getElementById('error-display');
            if (display) {
                display.style.display = 'block';
                display.innerHTML = '<strong>오류 발생:</strong><br>' + message + (lineno ? '<br>줄 번호: ' + lineno : '');
            }
            return false;
        };

        // 당겨서 새로고침 로직
        (function() {
            var startY = 0;
            var pulling = false;
            var threshold = 100;
            var indicator = document.getElementById('pull-to-refresh-indicator');
            var text = document.getElementById('pull-to-refresh-text');

            window.addEventListener('touchstart', function(e) {
                if (window.scrollY === 0) {
                    startY = e.touches[0].pageY;
                    pulling = true;
                }
            }, { passive: true });

            window.addEventListener('touchmove', function(e) {
                if (!pulling) return;
                var currentY = e.touches[0].pageY;
                var diff = currentY - startY;
                if (diff > 0 && window.scrollY === 0) {
                    var translateY = Math.min(diff * 0.5, threshold + 20);
                    indicator.style.transform = 'translateY(' + translateY + 'px)';
                    text.innerText = diff * 0.5 > threshold ? '↺ 놓아서 새로고침' : '↓ 당겨서 새로고침';
                }
            }, { passive: true });

            window.addEventListener('touchend', function(e) {
                if (!pulling) return;
                var diff = e.changedTouches[0].pageY - startY;
                if (diff * 0.5 > threshold && window.scrollY === 0) {
                    text.innerText = '새로고침 중...';
                    location.reload();
                } else {
                    indicator.style.transform = 'translateY(0)';
                }
                pulling = false;
            });

            setTimeout(function() {
                var btn = document.getElementById('manual-reload');
                var clearBtn = document.getElementById('clear-storage');
                if (document.getElementById('loading-text') && document.getElementById('loading-text').offsetParent !== null) {
                    if (btn) btn.style.display = 'block';
                    if (clearBtn) clearBtn.style.display = 'block';
                }
            }, 5000);
        })();

        // React 앱 시작 (Babel 없이 실행 가능하도록 createElement 사용)
        (function() {
            var React = window.React;
            var ReactDOM = window.ReactDOM;
            var e = React.createElement;
            var useState = React.useState;
            var useEffect = React.useEffect;
            var useMemo = React.useMemo;

            var STORAGE_KEY = 'INV_HOUSEHOLD_DATA';
            var FIREBASE_CONFIG_KEY = 'INV_FIREBASE_CONFIG';
            var SHARED_ID_KEY = 'INV_SHARED_ID';

            var initialData = {
                owners: [{ id: 'o1', name: '홍길동' }],
                groups: [{ id: 'g1', name: '주거래' }],
                assets: [{ id: 'a1', ownerId: 'o1', groupId: 'g1', name: '현금', type: 'Cash', initialBalance: 0 }],
                categories: [
                    { id: 'ex1', type: 'Expense', name: '식비' }, { id: 'ex2', type: 'Expense', name: '카페/간식' },
                    { id: 'ex3', type: 'Expense', name: '외식/배달' }, { id: 'ex4', type: 'Expense', name: '생활용품' },
                    { id: 'ex5', type: 'Expense', name: '교통' }, { id: 'ex6', type: 'Expense', name: '주거/통신' },
                    { id: 'ex7', type: 'Expense', name: '건강' }, { id: 'ex8', type: 'Expense', name: '문화' },
                    { id: 'ex9', type: 'Expense', name: '여행' }, { id: 'ex10', type: 'Expense', name: '교육' },
                    { id: 'ex11', type: 'Expense', name: '경조사' }, { id: 'ex12', type: 'Expense', name: '대출' },
                    { id: 'ex13', type: 'Expense', name: '부모님' }, { id: 'ex14', type: 'Expense', name: '미용' },
                    { id: 'ex15', type: 'Expense', name: '용돈' }, { id: 'ex16', type: 'Expense', name: '기타' },
                    { id: 'in1', type: 'Income', name: '급여' }, { id: 'in2', type: 'Income', name: '금융수입' },
                    { id: 'in3', type: 'Income', name: '기타수입' }, { id: 'in4', type: 'Income', name: '보너스' },
                    { id: 'tr1', type: 'Transfer', name: '저축' }, { id: 'tr2', type: 'Transfer', name: '이체' }
                ],
                transactions: []
            };

            function Icon(props) {
                var name = props.name;
                var size = props.size || 18;
                var className = props.className || "";
                var style = props.style || {};

                useEffect(function() {
                    if (window.lucide) {
                        window.lucide.createIcons();
                    }
                }, [name]);

                return e('i', {
                    'data-lucide': name,
                    className: className,
                    style: Object.assign({ width: size, height: size, display: 'inline-block' }, style)
                });
            }

            function App() {
                var dataState = useState(function() {
                    try {
                        var saved = localStorage.getItem(STORAGE_KEY);
                        return saved ? JSON.parse(saved) : initialData;
                    } catch (err) { return initialData; }
                });
                var data = dataState[0];
                var tabState = useState('transactions');
                var tab = tabState[0];
                var setTab = tabState[1];
                var sidebarOpenState = useState(false);
                var sidebarOpen = sidebarOpenState[0];
                var setSidebarOpen = sidebarOpenState[1];

                useEffect(function() {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                }, [data]);

                return e(React.Fragment, null,
                    e('div', { className: 'mobile-header' },
                        e('button', { 
                            onClick: function() { setSidebarOpen(true); },
                            style: { background: 'transparent', color: 'var(--text-primary)' }
                        }, e(Icon, { name: 'menu', size: 24 })),
                        e('h2', { style: { flex: 1, textAlign: 'center' } }, '가계부'),
                        e('button', { 
                            onClick: function() { location.reload(); },
                            style: { background: 'transparent', color: 'var(--text-primary)' }
                        }, e(Icon, { name: 'refresh-cw', size: 22 }))
                    ),
                    e('div', { className: 'sidebar ' + (sidebarOpen ? 'mobile-open' : '') },
                        e('div', { className: 'nav-item', onClick: function() { setTab('transactions'); setSidebarOpen(false); } }, e(Icon, { name: 'list' }), ' 거래 내역'),
                        e('div', { className: 'nav-item', onClick: function() { setTab('assets'); setSidebarOpen(false); } }, e(Icon, { name: 'wallet' }), ' 자산 현황')
                    ),
                    e('div', { className: 'main-content' },
                        tab === 'transactions' ? '거래 내역 화면 (데이터를 불러오는 데 성공했습니다!)' : '자산 현황 화면'
                    )
                );
            }

            var rootElement = document.getElementById('root');
            if (rootElement) {
                ReactDOM.createRoot(rootElement).render(e(App));
            }
        })();
    </script>
</body>
</html>
