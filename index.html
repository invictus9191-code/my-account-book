<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Finance - 가계부</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Scripts -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-apexcharts@1.4.1/dist/react-apexcharts.iife.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>

<body>
    <div id="root">
        <div style="color: white; padding: 20px; font-family: sans-serif;">화면을 불러오는 중입니다... (잠시만 기다려 주세요)</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const STORAGE_KEY = 'INV_HOUSEHOLD_DATA';
        const FIREBASE_CONFIG_KEY = 'INV_FIREBASE_CONFIG';
        const PASSWORD_KEY = 'INV_APP_PASSWORD';
        const SHARED_ID_KEY = 'INV_SHARED_ID';
        const DEFAULT_PASSWORD = '9999';

        const initialData = {
            owners: [{ id: 'o1', name: '홍길동' }],
            groups: [{ id: 'g1', name: '주거래' }],
            assets: [{ id: 'a1', ownerId: 'o1', groupId: 'g1', name: '현금', type: 'Cash', initialBalance: 0 }],
            categories: [
                { id: 'ex1', type: 'Expense', name: '식비' }, { id: 'ex2', type: 'Expense', name: '카페/간식' },
                { id: 'ex3', type: 'Expense', name: '외식/배달' }, { id: 'ex4', type: 'Expense', name: '생활용품' },
                { id: 'ex5', type: 'Expense', name: '교통' }, { id: 'ex6', type: 'Expense', name: '주거/통신' },
                { id: 'ex7', type: 'Expense', name: '건강' }, { id: 'ex8', type: 'Expense', name: '문화' },
                { id: 'ex9', type: 'Expense', name: '여행' }, { id: 'ex10', type: 'Expense', name: '교육' },
                { id: 'ex11', type: 'Expense', name: '경조사' }, { id: 'ex12', type: 'Expense', name: '대출' },
                { id: 'ex13', type: 'Expense', name: '부모님' }, { id: 'ex14', type: 'Expense', name: '미용' },
                { id: 'ex15', type: 'Expense', name: '용돈' }, { id: 'ex16', type: 'Expense', name: '기타' },
                { id: 'in1', type: 'Income', name: '급여' }, { id: 'in2', type: 'Income', name: '금융수입' },
                { id: 'in3', type: 'Income', name: '기타수입' }, { id: 'in4', type: 'Income', name: '보너스' },
                { id: 'tr1', type: 'Transfer', name: '저축' }, { id: 'tr2', type: 'Transfer', name: '이체' }
            ],
            transactions: []
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const calculateAssetBalance = (assetId, assets, transactions, upToDate) => {
            const asset = assets.find(a => a.id === assetId);
            if (!asset) return 0;
            const history = transactions.filter(t => {
                const match = t.assetId === assetId || t.toAssetId === assetId;
                if (upToDate) return match && t.date <= upToDate;
                return match;
            });
            return history.reduce((sum, t) => {
                const amt = Number(t.amount || 0);
                if (t.type === 'Income' && t.assetId === assetId) return sum + amt;
                if (t.type === 'Expense' && t.assetId === assetId) return sum - amt;
                if (t.type === 'Transfer') {
                    if (t.assetId === assetId) return sum - amt;
                    if (t.toAssetId === assetId) return sum + amt;
                }
                return sum;
            }, Number(asset.initialBalance || 0));
        };

        function Dashboard({ data, setEdit, setShowModal, setEditAsset, setShowAssetModal }) {
            const [selectedMonth, setSelectedMonth] = useState(() => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });
            const [view, setView] = useState('main'); // main, income_detail, expense_detail, asset_detail, category_list
            const [selectedId, setSelectedId] = useState(null); // categoryId or assetGroupId
            const [chartType, setChartType] = useState('income_expense'); // income_expense or savings

            const availableMonths = useMemo(() => {
                const months = new Set();
                data.transactions.forEach(t => months.add(t.date.substring(0, 7)));
                const now = new Date();
                months.add(`${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`);
                return Array.from(months).sort((a, b) => b.localeCompare(a));
            }, [data.transactions]);

            const stats = useMemo(() => {
                const [year, month] = selectedMonth.split('-').map(Number);
                const currentMonthT = data.transactions.filter(t => t.date.startsWith(selectedMonth));

                // Identify savings categories
                const savingsCategories = data.categories.filter(c => c.name === '저축' || c.name.includes('저축')).map(c => c.id);

                const income = currentMonthT.filter(t => t.type === 'Income').reduce((s, t) => s + Number(t.amount), 0);
                const rawExpense = currentMonthT.filter(t => t.type === 'Expense').reduce((s, t) => s + Number(t.amount), 0);
                const savings = currentMonthT.filter(t => (t.type === 'Expense' || t.type === 'Transfer') && savingsCategories.includes(t.categoryId)).reduce((s, t) => s + Math.abs(Number(t.amount)), 0);
                const expense = rawExpense - currentMonthT.filter(t => t.type === 'Expense' && savingsCategories.includes(t.categoryId)).reduce((s, t) => s + Number(t.amount), 0);

                // Previous month stats
                const prevDate = new Date(year, month - 2, 1);
                const prevMonthStr = `${prevDate.getFullYear()}-${String(prevDate.getMonth() + 1).padStart(2, '0')}`;
                const prevMonthT = data.transactions.filter(t => t.date.startsWith(prevMonthStr));
                const prevIncome = prevMonthT.filter(t => t.type === 'Income').reduce((s, t) => s + Number(t.amount), 0);
                const prevRawExpense = prevMonthT.filter(t => t.type === 'Expense').reduce((s, t) => s + Number(t.amount), 0);
                const prevSavings = prevMonthT.filter(t => (t.type === 'Expense' || t.type === 'Transfer') && savingsCategories.includes(t.categoryId)).reduce((s, t) => s + Math.abs(Number(t.amount)), 0);
                const prevExpense = prevRawExpense - prevMonthT.filter(t => t.type === 'Expense' && savingsCategories.includes(t.categoryId)).reduce((s, t) => s + Number(t.amount), 0);

                // Assets up to selected month
                const totalAssets = data.assets.reduce((sum, a) => {
                    const initial = Number(a.initialBalance || 0);
                    const history = data.transactions.filter(t => t.date <= `${selectedMonth}-31` && (t.assetId === a.id || t.toAssetId === a.id));
                    const balance = history.reduce((s, t) => {
                        const amt = Number(t.amount || 0);
                        if (t.type === 'Income' && t.assetId === a.id) return s + amt;
                        if (t.type === 'Expense' && t.assetId === a.id) return s - amt;
                        if (t.type === 'Transfer') {
                            if (t.assetId === a.id) return s - amt;
                            if (t.toAssetId === a.id) return s + amt;
                        }
                        return s;
                    }, initial);
                    return sum + balance;
                }, 0);

                return { income, expense, savings, totalAssets, prevIncome, prevExpense };
            }, [selectedMonth, data.transactions, data.assets]);

            const annualData = useMemo(() => {
                const [year, month] = selectedMonth.split('-').map(Number);
                const labels = Array.from({ length: 12 }, (_, i) => {
                    const d = new Date(year, month - 1 - (11 - i), 1);
                    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                });
                const incomeData = labels.map(m => data.transactions.filter(t => t.date.startsWith(m) && t.type === 'Income').reduce((s, t) => s + Number(t.amount), 0));

                const savingsCategories = data.categories.filter(c => c.name === '저축' || c.name.includes('저축')).map(c => c.id);

                const savingsData = labels.map(m => data.transactions.filter(t => t.date.startsWith(m) && (t.type === 'Expense' || t.type === 'Transfer') && savingsCategories.includes(t.categoryId)).reduce((s, t) => s + Math.abs(Number(t.amount)), 0));

                const expenseData = labels.map(m => {
                    const rawExp = data.transactions.filter(t => t.date.startsWith(m) && t.type === 'Expense').reduce((s, t) => s + Number(t.amount), 0);
                    const sav = data.transactions.filter(t => t.date.startsWith(m) && t.type === 'Expense' && savingsCategories.includes(t.categoryId)).reduce((s, t) => s + Number(t.amount), 0);
                    return rawExp - sav;
                });

                const assetData = labels.map(m => {
                    return data.assets.reduce((sum, a) => {
                        const initial = Number(a.initialBalance || 0);
                        const history = data.transactions.filter(t => t.date <= `${m}-31` && (t.assetId === a.id || t.toAssetId === a.id));
                        const balance = history.reduce((s, t) => {
                            const amt = Number(t.amount || 0);
                            if (t.type === 'Income' && t.assetId === a.id) return s + amt;
                            if (t.type === 'Expense' && t.assetId === a.id) return s - amt;
                            if (t.type === 'Transfer') {
                                if (t.assetId === a.id) return s - amt;
                                if (t.toAssetId === a.id) return s + amt;
                            }
                            return s;
                        }, initial);
                        return sum + balance;
                    }, 0);
                });

                return { labels: labels.map(m => `${m.substring(5)}월`), incomeData, expenseData, savingsData, assetData };
            }, [selectedMonth, data.transactions, data.assets]);

            const chartOptions = {
                chart: { type: 'bar', toolbar: { show: false }, background: 'transparent' },
                theme: { mode: 'dark' },
                xaxis: { categories: annualData.labels },
                yaxis: { labels: { formatter: (value) => value.toLocaleString() } },
                dataLabels: { enabled: false },
                grid: { borderColor: '#30363d' },
                tooltip: {
                    theme: 'dark',
                    y: { formatter: (value) => value.toLocaleString() + '원' }
                }
            };

            const renderDiff = (curr, prev) => {
                const diff = curr - prev;
                const icon = diff >= 0 ? 'trending-up' : 'trending-down';
                const color = diff >= 0 ? 'var(--income-color)' : 'var(--expense-color)';
                return (
                    <div style={{ fontSize: '0.75rem', color, display: 'flex', alignItems: 'center', gap: '3px', marginTop: '6px', opacity: 0.85 }}>
                        <Icon name={icon} size={12} /> {Math.abs(diff).toLocaleString()} {diff >= 0 ? '▲' : '▼'} 전월 대비
                    </div>
                );
            };

            if (view === 'income_detail' || view === 'expense_detail' || view === 'savings_detail') {
                const type = view === 'income_detail' ? 'Income' : 'Expense';
                const savingsCategories = data.categories.filter(c => c.name === '저축' || c.name.includes('저축')).map(c => c.id);

                const monthT = data.transactions.filter(t => {
                    if (!t.date.startsWith(selectedMonth)) return false;
                    if (view === 'savings_detail') return (t.type === 'Expense' || t.type === 'Transfer') && savingsCategories.includes(t.categoryId);
                    if (view === 'expense_detail') return t.type === 'Expense' && !savingsCategories.includes(t.categoryId);
                    return t.type === type;
                });

                const catGrouped = data.categories.filter(c => {
                    if (view === 'savings_detail') return savingsCategories.includes(c.id);
                    if (view === 'expense_detail') return c.type === 'Expense' && !savingsCategories.includes(c.id);
                    return c.type === type;
                }).map(c => ({
                    ...c,
                    amount: monthT.filter(t => t.categoryId === c.id).reduce((s, t) => s + Number(t.amount), 0)
                })).filter(c => c.amount > 0).sort((a, b) => b.amount - a.amount);

                return (
                    <div className="fade-in">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '1.5rem' }}>
                            <button onClick={() => setView('main')} className="icon-btn"><Icon name="arrow-left" /></button>
                            <h1 className="detail-title">{selectedMonth} {view === 'income_detail' ? '수입' : view === 'expense_detail' ? '지출' : '저축'} 카테고리별</h1>
                        </div>
                        <div className="card">
                            {catGrouped.map(c => (
                                <div key={c.id} className="list-item" onClick={() => { setSelectedId(c.id); setView('category_list'); }} style={{ display: 'flex', justifyContent: 'space-between', padding: '1rem', borderBottom: '1px solid #30363d', cursor: 'pointer' }}>
                                    <span>{c.name}</span>
                                    <span style={{ fontWeight: 600 }}>{c.amount.toLocaleString()}원 <Icon name="chevron-right" size={14} /></span>
                                </div>
                            ))}
                            {catGrouped.length === 0 && <div style={{ padding: '2rem', textAlign: 'center' }}>데이터가 없습니다.</div>}
                        </div>
                    </div>
                );
            }

            if (view === 'category_list') {
                const category = data.categories.find(c => c.id === selectedId);
                const list = data.transactions.filter(t => t.date.startsWith(selectedMonth) && t.categoryId === selectedId).sort((a, b) => b.date.localeCompare(a.date));
                const savingsCategories = data.categories.filter(c => c.name === '저축' || c.name.includes('저축')).map(c => c.id);
                const backView = category.type === 'Income' ? 'income_detail' : savingsCategories.includes(category.id) ? 'savings_detail' : 'expense_detail';
                return (
                    <div className="fade-in">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '1.5rem' }}>
                            <button onClick={() => setView(backView)} className="icon-btn"><Icon name="arrow-left" /></button>
                            <h1 className="detail-title">{selectedMonth} {category.name} 내역</h1>
                        </div>
                        <div className="card" style={{ padding: 0 }}>
                            <table className="transaction-table">
                                <thead><tr><th>날짜</th><th>금액</th><th className="mobile-hide">자산</th><th>메모</th></tr></thead>
                                <tbody>
                                    {list.map(t => (
                                        <tr key={t.id} onClick={() => { setEdit(t); setShowModal(true); }} style={{ cursor: 'pointer' }} className="list-item">
                                            <td>{t.date.substring(8)}일</td>
                                            <td style={{ fontWeight: 600 }}>{Number(t.amount).toLocaleString()}</td>
                                            <td className="mobile-hide">{data.assets.find(a => a.id === t.assetId)?.name}</td>
                                            <td>{t.memo}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            }

            if (view === 'asset_detail') {
                const upToDate = `${selectedMonth}-31`;
                const groupGrouped = (data.groups || []).map(g => {
                    const assets = data.assets.filter(a => a.groupId === g.id);
                    const total = assets.reduce((sum, a) => sum + calculateAssetBalance(a.id, data.assets, data.transactions, upToDate), 0);
                    return { ...g, total, assets };
                }).filter(g => g.total !== 0 || g.assets.length > 0);

                return (
                    <div className="fade-in">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '1.5rem' }}>
                            <button onClick={() => setView('main')} className="icon-btn"><Icon name="arrow-left" /></button>
                            <h1 className="detail-title">자산 현황 ({selectedMonth.split('-')[0]}년 {selectedMonth.split('-')[1]}월 말 기준)</h1>
                        </div>
                        <div className="card">
                            {groupGrouped.map(g => (
                                <div key={g.id} style={{ marginBottom: '1.5rem' }}>
                                    <h3 style={{ borderBottom: '1px solid #30363d', paddingBottom: '0.5rem', marginBottom: '0.5rem', display: 'flex', justifyContent: 'space-between' }}>
                                        {g.name} <span>{g.total.toLocaleString()}원</span>
                                    </h3>
                                    {g.assets.map(a => {
                                        const bal = calculateAssetBalance(a.id, data.assets, data.transactions, upToDate);
                                        return (
                                            <div key={a.id} onClick={() => { setEditAsset(a); setShowAssetModal(true); }} style={{ display: 'flex', justifyContent: 'space-between', paddingLeft: '1rem', paddingBottom: '0.3rem', color: '#8b949e', cursor: 'pointer' }} className="list-item">
                                                <span>{a.name}</span>
                                                <span>{bal.toLocaleString()}원</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="fade-in">
                    <div style={{ display: 'flex', justifyContent: 'flex-end', alignItems: 'center', marginBottom: '1.5rem' }}>
                        <select className="month-select" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} style={{ padding: '0.5rem', borderRadius: '6px', background: '#21262d', color: 'white', border: '1px solid #30363d' }}>
                            {availableMonths.map(m => {
                                const [y, mon] = m.split('-');
                                return <option key={m} value={m}>{y}년 {mon}월</option>;
                            })}
                        </select>
                    </div>

                    <div className="dashboard-grid">
                        <div className="card stat-card interactive" onClick={() => setView('income_detail')}>
                            <span className="stat-label stat-title-white">수입</span>
                            <span className="stat-value">{stats.income.toLocaleString()}원</span>
                            {renderDiff(stats.income, stats.prevIncome)}
                        </div>
                        <div className="card stat-card interactive" onClick={() => setView('expense_detail')}>
                            <span className="stat-label stat-title-white">지출</span>
                            <span className="stat-value">{stats.expense.toLocaleString()}원</span>
                            {renderDiff(stats.expense, stats.prevExpense)}
                        </div>
                        <div className="card stat-card interactive" onClick={() => setView('savings_detail')}>
                            <span className="stat-label stat-title-white">저축</span>
                            <span className="stat-value">{stats.savings.toLocaleString()}원</span>
                            {stats.prevSavings !== undefined && (
                                <div className={`stat-change ${stats.savings >= stats.prevSavings ? 'plus' : 'minus'}`}>
                                    전월 대비 {Math.abs(stats.savings - stats.prevSavings).toLocaleString()}원 {stats.savings >= stats.prevSavings ? '증가' : '감소'}
                                </div>
                            )}
                        </div>
                        <div className="card stat-card interactive" onClick={() => setView('asset_detail')}>
                            <span className="stat-label">자산 총액</span>
                            <span className="stat-value">{stats.totalAssets.toLocaleString()}원</span>
                            <div style={{ fontSize: '0.78rem', color: 'var(--text-secondary)', marginTop: '4px' }}>{selectedMonth.split('-')[1]}월 말 기준</div>
                        </div>
                    </div>

                    <div className="dashboard-grid" style={{ marginTop: '1.5rem' }}>
                        <div className="card">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                <h3>연간 흐름</h3>
                                <div style={{ display: 'flex', gap: '0.5rem', background: 'rgba(22, 27, 34, 0.4)', padding: '4px', borderRadius: '8px' }}>
                                    <button
                                        onClick={() => setChartType('income_expense')}
                                        style={{ background: chartType === 'income_expense' ? '#30363d' : 'transparent', color: chartType === 'income_expense' ? 'white' : '#8b949e', padding: '0.3rem 0.6rem', fontSize: '0.85rem' }}
                                    >수입/지출</button>
                                    <button
                                        onClick={() => setChartType('savings')}
                                        style={{ background: chartType === 'savings' ? '#30363d' : 'transparent', color: chartType === 'savings' ? 'white' : '#8b949e', padding: '0.3rem 0.6rem', fontSize: '0.85rem' }}
                                    >저축</button>
                                </div>
                            </div>

                            {window.ReactApexChart ? (
                                chartType === 'income_expense' ? (
                                    <window.ReactApexChart
                                        options={{ ...chartOptions, colors: ['#238636', '#da3633'] }}
                                        series={[
                                            { name: '수입', data: annualData.incomeData },
                                            { name: '지출', data: annualData.expenseData }
                                        ]}
                                        type="bar" height={280}
                                    />
                                ) : (
                                    <window.ReactApexChart
                                        options={{ ...chartOptions, colors: ['#1f6feb'] }}
                                        series={[{ name: '저축', data: annualData.savingsData }]}
                                        type="bar" height={280}
                                    />
                                )
                            ) : "차트 로딩 중..."}
                        </div>
                        <div className="card">
                            <h3>연간 자산 흐름</h3>
                            {window.ReactApexChart ? (
                                <window.ReactApexChart
                                    options={{ ...chartOptions, colors: ['#58a6ff'] }}
                                    series={[{ name: '자산액', data: annualData.assetData }]}
                                    type="bar" height={280}
                                />
                            ) : "차트 로딩 중..."}
                        </div>
                    </div>
                </div>
            );
        }

        function TransactionPage({ data, setData, setEdit, setShowModal, syncToCloud }) {
            const del = (id) => {
                if (confirm('삭제하시겠습니까?')) {
                    const newData = { ...data, transactions: data.transactions.filter(t => t.id !== id) };
                    setData(newData);
                    syncToCloud(newData);
                }
            };

            const grouped = data.transactions.sort((a, b) => new Date(b.date) - new Date(a.date)).reduce((acc, t) => {
                const month = t.date.substring(0, 7); // YYYY-MM
                if (!acc[month]) acc[month] = { transactions: [], income: 0, expense: 0, savings: 0 };
                acc[month].transactions.push(t);

                const savingsCategories = data.categories.filter(c => c.name === '저축' || c.name.includes('저축')).map(c => c.id);

                if (t.type === 'Income') acc[month].income += Number(t.amount);

                if ((t.type === 'Expense' || t.type === 'Transfer') && savingsCategories.includes(t.categoryId)) {
                    acc[month].savings += Math.abs(Number(t.amount));
                }

                if (t.type === 'Expense' && !savingsCategories.includes(t.categoryId)) {
                    acc[month].expense += Number(t.amount);
                }
                return acc;
            }, {});

                                        <button type="button" onClick={() => {
                                            const current = Number(form.initialBalance || 0);
                                            setForm({ ...form, initialBalance: (current + 10000).toString() });

        function TransactionModal({ data, setData, onClose, editItem, syncToCloud }) {
            const [form, setForm] = useState(() => {
                const groups = data.groups || [];
                const firstGroup = groups.length > 0 ? groups[0].id : '';
                const initial = editItem || { date: new Date().toISOString().split('T')[0], type: 'Expense', amount: '', categoryId: '', groupId: firstGroup, assetId: data.assets[0]?.id || '', toGroupId: firstGroup, toAssetId: '', memo: '' };

                // For editing existing records, determine group from asset
                if (editItem) {
                    const fromAsset = data.assets.find(a => a.id === editItem.assetId);
                    if (fromAsset) initial.groupId = fromAsset.groupId || '';
                    if (editItem.type === 'Transfer') {
                        const toAsset = data.assets.find(a => a.id === editItem.toAssetId);
                        if (toAsset) initial.toGroupId = toAsset.groupId || '';
                    }
                }
                return { ...initial, groupId: initial.groupId || firstGroup, toGroupId: initial.toGroupId || firstGroup };
            });
            const filteredAssets = data.assets.filter(a => form.groupId ? a.groupId === form.groupId : true);
            const filteredToAssets = data.assets.filter(a => (form.toGroupId ? a.groupId === form.toGroupId : true) && a.id !== form.assetId);
            const filteredCategories = data.categories.filter(c => c.type === form.type);
            useEffect(() => {
                if (filteredAssets.length > 0 && !filteredAssets.find(a => a.id === form.assetId)) setForm(f => ({ ...f, assetId: filteredAssets[0].id }));
                if (form.type === 'Transfer' && filteredToAssets.length > 0 && !filteredToAssets.find(a => a.id === form.toAssetId)) {
                    setForm(f => ({ ...f, toAssetId: filteredToAssets[0].id }));
                }
            }, [form.groupId, form.type, form.toGroupId]);
            const handleSubmit = (e) => {
                if (e) e.preventDefault();
                if (form.type === 'Transfer' && form.assetId === form.toAssetId) { alert('동일 자산 간 이체는 불가합니다.'); return; }
                const newData = { ...data, transactions: editItem ? data.transactions.map(t => t.id === editItem.id ? { ...form, id: editItem.id } : t) : [...data.transactions, { ...form, id: Date.now().toString() }] };
                setData(newData);
                syncToCloud(newData);
                onClose();
            };
            const handleDelete = () => {
                if (confirm('이 거래 내역을 삭제하시겠습니까?')) {
                    const newData = { ...data, transactions: data.transactions.filter(t => t.id !== editItem.id) };
                    setData(newData);
                    syncToCloud(newData);
                    onClose();
                }
            };
            const handleAmountChange = (e) => {
                const val = e.target.value.replace(/[^0-9]/g, '');
                setForm({ ...form, amount: val });
            };
            const handleQuickAmount = (val) => {
                const current = Number(form.amount || 0);
                setForm({ ...form, amount: (current + val).toString() });
            };
            const clearAmount = () => setForm({ ...form, amount: '' });

            return (
                <div style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', background: 'rgba(0,0,0,0.8)', display: 'flex', justifyContent: 'center', alignItems: 'flex-start', overflowY: 'auto', zIndex: 1000, padding: '1rem 0' }}>
                    <div className="card modal-content" style={{ maxWidth: '420px', width: '90%', padding: '2rem', margin: 'auto' }}>
                        <h2 className="modal-title" style={{ marginBottom: '1.5rem', fontSize: '1.5rem' }}>거래 {editItem ? '수정' : '추가'}</h2>
                        <form onSubmit={handleSubmit}>
                            <div className="form-row"><label>날짜</label><input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} required /></div>
                            <div className="form-row">
                                <label>구분</label>
                                <div className="type-button-group">
                                    <button type="button" className={form.type === 'Income' ? 'active' : ''} data-type="Income" onClick={() => setForm({ ...form, type: 'Income' })}>수입</button>
                                    <button type="button" className={form.type === 'Expense' ? 'active' : ''} data-type="Expense" onClick={() => setForm({ ...form, type: 'Expense' })}>지출</button>
                                    <button type="button" className={form.type === 'Transfer' ? 'active' : ''} data-type="Transfer" onClick={() => setForm({ ...form, type: 'Transfer' })}>이체</button>
                                </div>
                            </div>
                            <div className="form-row"><label>카테고리</label><select value={form.categoryId} onChange={e => setForm({ ...form, categoryId: e.target.value })} required><option value="">선택하세요</option>{filteredCategories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
                            <div className="form-row" style={{ alignItems: 'flex-start' }}>
                                <label style={{ marginTop: '10px' }}>금액</label>
                                <div className="quick-amount-container">
                                    <input type="text" value={form.amount ? Number(form.amount).toLocaleString() : ''} onChange={handleAmountChange} placeholder="금액 입력" required />
                                    <div className="quick-amount-buttons">
                                        <button type="button" onClick={() => handleQuickAmount(1000000)}>백만</button>
                                        <button type="button" onClick={() => handleQuickAmount(100000)}>십만</button>
                                        <button type="button" onClick={() => handleQuickAmount(10000)}>만</button>
                                        <button type="button" onClick={() => handleQuickAmount(1000)}>천</button>
                                        <button type="button" onClick={() => handleQuickAmount(100)}>백</button>
                                        <button type="button" onClick={() => handleQuickAmount(10)}>십</button>
                                        <button type="button" className="clear-btn" onClick={clearAmount}>지우기</button>
                                    </div>
                                </div>
                            </div>
                            <div className="form-row"><label>그룹 (출금)</label><select value={form.groupId} onChange={e => setForm({ ...form, groupId: e.target.value })}><option value="">전체/미지정</option>{(data.groups || []).map(g => <option key={g.id} value={g.id}>{g.name}</option>)}</select></div>
                            <div className="form-row"><label>{form.type === 'Transfer' ? '출금 자산' : '자산'}</label><select value={form.assetId} onChange={e => setForm({ ...form, assetId: e.target.value })}>{filteredAssets.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
                            {form.type === 'Transfer' && (
                                <React.Fragment>
                                    <div className="form-row"><label>그룹 (입금)</label><select value={form.toGroupId} onChange={e => setForm({ ...form, toGroupId: e.target.value })}><option value="">전체/미지정</option>{(data.groups || []).map(g => <option key={g.id} value={g.id}>{g.name}</option>)}</select></div>
                                    <div className="form-row"><label>입금 자산</label><select value={form.toAssetId} onChange={e => setForm({ ...form, toAssetId: e.target.value })}>{filteredToAssets.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
                                </React.Fragment>
                            )}
                            <div className="form-row"><label>메모</label><input value={form.memo} onChange={e => setForm({ ...form, memo: e.target.value })} placeholder="메모" /></div>
                            <div className="modal-footer" style={{ display: 'flex', gap: '8px', justifyContent: 'flex-end', marginTop: '1.5rem' }}>
                                <button type="button" onClick={onClose} style={{ background: '#30363d', color: 'white' }}>취소</button>
                                {editItem && <button type="button" className="danger" onClick={handleDelete}>삭제</button>}
                                <button type="submit" className="primary">저장</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function Settings({ data, setData, fbConfig, setFbConfig, syncToCloud }) {
            const [fbVal, setFbVal] = useState(fbConfig ? JSON.stringify(fbConfig, null, 2) : '');
            const [newPw, setNewPw] = useState('');
            const [activeTab, setActiveTab] = useState('general'); // general, owners, groups, categories, assets

            // State for management tabs
            const [newOwner, setNewOwner] = useState('');
            const [newGroup, setNewGroup] = useState('');
            const [newCat, setNewCat] = useState({ name: '', type: 'Expense' });
            const [editingAsset, setEditingAsset] = useState(null);
            const [showAssetModal, setShowAssetModal] = useState(false);
            const [tempSharedId, setTempSharedId] = useState(localStorage.getItem(SHARED_ID_KEY) || '');

            const saveFb = () => { try { const c = JSON.parse(fbVal); localStorage.setItem(FIREBASE_CONFIG_KEY, JSON.stringify(c)); setFbConfig(c); alert('Firebase 설정이 저장되었습니다. 앱을 다시 시작합니다.'); location.reload(); } catch (e) { alert('유효한 JSON 형식이 아닙니다.'); } };
            const resetFb = () => { if (confirm('서버 설정을 초기화하시겠습니까?')) { localStorage.removeItem(FIREBASE_CONFIG_KEY); setFbConfig(null); alert('설정이 초기화되었습니다.'); location.reload(); } };
            const changePw = () => { if (newPw.length < 4) { alert('비밀번호는 4자리 이상이어야 합니다.'); return; } localStorage.setItem(PASSWORD_KEY, newPw); setNewPw(''); alert('비밀번호가 변경되었습니다.'); };

            const saveSharedId = () => {
                if (tempSharedId.trim()) {
                    localStorage.setItem(SHARED_ID_KEY, tempSharedId.trim());
                    alert('공유 ID가 저장되었습니다. 앱을 다시 시작합니다.');
                    location.reload();
                } else {
                    localStorage.removeItem(SHARED_ID_KEY);
                    alert('공유 ID가 제거되었습니다. 개인 모드로 전환합니다.');
                    location.reload();
                }
            };
            const generateSharedId = () => {
                const newId = Math.random().toString(36).substring(2, 10).toUpperCase();
                setTempSharedId(newId);
                alert(`신규 공유 ID가 생성되었습니다: ${newId}\n'저장' 버튼을 눌러야 적용됩니다.`);
            };

            const exportData = () => { const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `household_backup_${new Date().toISOString().split('T')[0]}.json`; a.click(); };
            const importData = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const d = JSON.parse(ev.target.result); if (confirm('데이터를 덮어쓰시겠습니까? 현재 데이터는 사라집니다.')) { setData(d); alert('데이터를 성공적으로 불러왔습니다.'); } } catch (err) { alert('잘못된 백업 파일입니다.'); } }; reader.readAsText(file); };

            // Management Functions
            const addOwner = () => { if (!newOwner) return; const newData = { ...data, owners: [...data.owners, { id: Date.now().toString(), name: newOwner }] }; setData(newData); syncToCloud(newData); setNewOwner(''); };
            const delOwner = (id) => { if (confirm('삭제하시겠습니까?')) { const newData = { ...data, owners: data.owners.filter(o => o.id !== id) }; setData(newData); syncToCloud(newData); } };

            const addGroup = () => { if (!newGroup) return; const newData = { ...data, groups: [...(data.groups || []), { id: Date.now().toString(), name: newGroup }] }; setData(newData); syncToCloud(newData); setNewGroup(''); };
            const delGroup = (id) => { if (confirm('삭제하시겠습니까?')) { const newData = { ...data, groups: data.groups.filter(g => g.id !== id) }; setData(newData); syncToCloud(newData); } };

            const addCat = () => { if (!newCat.name) return; const newData = { ...data, categories: [...data.categories, { ...newCat, id: Date.now().toString() }] }; setData(newData); syncToCloud(newData); setNewCat({ ...newCat, name: '' }); };
            const delCat = (id) => { if (confirm('삭제하시겠습니까?')) { const newData = { ...data, categories: data.categories.filter(c => c.id !== id) }; setData(newData); syncToCloud(newData); } };

            const renderCatList = (type) => (
                <div style={{ marginBottom: '1.5rem' }}>
                    <h4 style={{ marginBottom: '0.5rem', color: '#8b949e' }}>{type === 'Income' ? '수입' : type === 'Expense' ? '지출' : '이체'}</h4>
                    <div style={{ display: 'flex', gap: '8px', margin: '0.5rem 0' }}><input value={newCat.type === type ? newCat.name : ''} onChange={e => setNewCat({ type, name: e.target.value })} placeholder="카테고리명" /><button className="primary" onClick={() => { if (newCat.type === type) addCat(); }}>추가</button></div>
                    {data.categories.filter(c => c.type === type).map(c => (<div key={c.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid #30363d' }}>{c.name} <button onClick={() => delCat(c.id)} style={{ background: 'transparent', color: '#da3633', fontSize: '0.8rem' }}>삭제</button></div>))}
                </div>
            );

            return (
                <div className="fade-in">
                    <div className="card" style={{ padding: 0, overflow: 'hidden', marginBottom: '1.5rem' }}>
                        <div style={{ display: 'flex', borderBottom: '1px solid #30363d', background: 'rgba(22, 27, 34, 0.5)', overflowX: 'auto' }}>
                            {[{ id: 'general', label: '일반/백업' }, { id: 'owners', label: '소유자' }, { id: 'groups', label: '자산 그룹' }, { id: 'assets', label: '자산 목록' }, { id: 'categories', label: '카테고리' }].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ padding: '1rem 1.5rem', background: 'transparent', color: activeTab === t.id ? '#58a6ff' : '#8b949e', borderBottom: activeTab === t.id ? '2px solid #58a6ff' : '2px solid transparent', borderRadius: 0, whiteSpace: 'nowrap' }}>
                                    {t.label}
                                </button>
                            ))}
                        </div>
                        <div style={{ padding: '1.5rem' }}>
                            {activeTab === 'general' && (
                                <div className="dashboard-grid">
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
                                        <div>
                                            <h3>🔑 비밀번호 변경</h3>
                                            <div style={{ display: 'flex', gap: '8px', margin: '1rem 0' }}><input type="password" value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="새 비밀번호 입력" /><button className="primary" onClick={changePw}>변경</button></div>
                                        </div>
                                        <div style={{ borderTop: '1px solid #30363d', paddingTop: '1.5rem' }}>
                                            <h3>🔗 데이터 공유 설정 (공유 ID)</h3>
                                            <p style={{ color: '#8b949e', fontSize: '0.85rem', marginBottom: '0.5rem' }}>동일한 공유 ID를 입력한 계정끼리 데이터가 실시간으로 연동됩니다.</p>
                                            <div style={{ display: 'flex', gap: '8px', margin: '0.5rem 0' }}>
                                                <input value={tempSharedId} onChange={e => setTempSharedId(e.target.value)} placeholder="공유 ID 입력" />
                                                <button className="primary" onClick={saveSharedId}>저장</button>
                                                <button onClick={generateSharedId} style={{ background: '#30363d', color: 'white' }}>생성</button>
                                            </div>
                                            {tempSharedId === (localStorage.getItem(SHARED_ID_KEY) || '') && tempSharedId && (
                                                <p style={{ color: '#238636', fontSize: '0.8rem' }}>현재 공유 모드 활성화 중</p>
                                            )}
                                        </div>
                                        <div style={{ borderTop: '1px solid #30363d', paddingTop: '1.5rem' }}>
                                            <h3>💾 데이터 백업 및 복구</h3>
                                            <div style={{ display: 'flex', gap: '12px', marginTop: '1rem' }}>
                                                <button onClick={exportData} style={{ background: '#30363d', color: 'white', flex: 1 }}><Icon name="download" size={16} /> JSON 저장</button>
                                                <label className="auth-btn login" style={{ textAlign: 'center', cursor: 'pointer', margin: 0, flex: 1 }}><Icon name="upload" size={16} /> 복구 <input type="file" accept=".json" onChange={importData} style={{ display: 'none' }} /></label>
                                            </div>
                                        </div>
                                    </div>
                                    <div>
                                        <h3>☁️ 서버 연동 (Firebase)</h3>
                                        <p style={{ color: '#8b949e', fontSize: '0.85rem', marginBottom: '1rem' }}>Firebase 프로젝트 구성 JSON을 입력하세요.</p>
                                        <textarea value={fbVal} onChange={e => setFbVal(e.target.value)} rows="8" style={{ width: '100%', marginBottom: '1rem', background: '#0d1117', color: '#8b949e', padding: '10px', fontSize: '13px', fontFamily: 'monospace' }} />
                                        <div style={{ display: 'flex', gap: '8px' }}>
                                            <button className="primary" onClick={saveFb}>저장</button>
                                            <button onClick={resetFb} style={{ background: '#30363d', color: 'white' }}>기본값으로 초기화</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'owners' && (
                                <div>
                                    <h3>소유자 관리</h3>
                                    <p style={{ color: '#8b949e', fontSize: '0.85rem', marginBottom: '1rem' }}>자산을 소유하는 구성원을 등록합니다.</p>
                                    <div style={{ display: 'flex', gap: '8px', margin: '1rem 0', maxWidth: '400px' }}><input value={newOwner} onChange={e => setNewOwner(e.target.value)} placeholder="이름" /><button className="primary" onClick={addOwner}>추가</button></div>
                                    <div style={{ maxWidth: '400px' }}>
                                        {data.owners.map(o => (<div key={o.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: '1px solid #30363d' }}>{o.name} <button onClick={() => delOwner(o.id)} style={{ background: 'transparent', color: '#da3633', fontSize: '0.85rem' }}>삭제</button></div>))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'groups' && (
                                <div>
                                    <h3>자산 그룹 관리</h3>
                                    <p style={{ color: '#8b949e', fontSize: '0.85rem', marginBottom: '1rem' }}>자산을 논리적으로 묶어주는 그룹을 등록합니다.</p>
                                    <div style={{ display: 'flex', gap: '8px', margin: '1rem 0', maxWidth: '400px' }}><input value={newGroup} onChange={e => setNewGroup(e.target.value)} placeholder="그룹명" /><button className="primary" onClick={addGroup}>추가</button></div>
                                    <div style={{ maxWidth: '400px' }}>
                                        {(data.groups || []).map(g => (<div key={g.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: '1px solid #30363d' }}>{g.name} <button onClick={() => delGroup(g.id)} style={{ background: 'transparent', color: '#da3633', fontSize: '0.85rem' }}>삭제</button></div>))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'categories' && (
                                <div className="dashboard-grid">
                                    <div>{renderCatList('Expense')}</div>
                                    <div>{renderCatList('Income')}</div>
                                    <div>{renderCatList('Transfer')}</div>
                                </div>
                            )}

                            {activeTab === 'assets' && (
                                <div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                        <h3>자산 목록 및 관리</h3>
                                        <button className="primary" onClick={() => { setEditingAsset(null); setShowAssetModal(true); }}>+ 자산 추가</button>
                                    </div>
                                    <div style={{ overflowX: 'auto' }}>
                                        <table>
                                            <thead><tr><th>자산명</th><th>소유자</th><th>그룹</th><th>유형</th><th>초기금액</th><th>현재금액</th><th>관리</th></tr></thead>
                                            <tbody>
                                                {data.assets.map(a => {
                                                    const bal = data.transactions.reduce((s, t) => {
                                                        const amt = Number(t.amount || 0);
                                                        if (t.type === 'Income' && t.assetId === a.id) return s + amt;
                                                        if (t.type === 'Expense' && t.assetId === a.id) return s - amt;
                                                        if (t.type === 'Transfer') {
                                                            if (t.assetId === a.id) return s - amt;
                                                            if (t.toAssetId === a.id) return s + amt;
                                                        }
                                                        return s;
                                                    }, Number(a.initialBalance || 0));
                                                    return (
                                                        <tr key={a.id}>
                                                            <td style={{ fontWeight: 500 }}>{a.name}</td>
                                                            <td>{data.owners.find(o => o.id === a.ownerId)?.name}</td>
                                                            <td>{data.groups?.find(g => g.id === a.groupId)?.name || '-'}</td>
                                                            <td>{a.type === 'Cash' ? '현금' : a.type === 'Bank' ? '은행' : '카드'}</td>
                                                            <td style={{ color: '#8b949e' }}>{Number(a.initialBalance || 0).toLocaleString()}</td>
                                                            <td style={{ fontWeight: 600, color: '#58a6ff' }}>{bal.toLocaleString()}</td>
                                                            <td>
                                                                <button onClick={() => { setEditingAsset(a); setShowAssetModal(true); }} style={{ background: 'transparent', color: '#58a6ff', padding: '0.3rem' }}>수정</button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                                {data.assets.length === 0 && <tr><td colSpan="7" style={{ textAlign: 'center', padding: '2rem' }}>등록된 자산이 없습니다.</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    {showAssetModal && <AssetModal data={data} setData={setData} onClose={() => setShowAssetModal(false)} editItem={editingAsset} syncToCloud={syncToCloud} />}
                </div>
            );
        }

        function App() {
            const [data, setData] = useState(() => {
                const s = localStorage.getItem(STORAGE_KEY);
                if (!s) return initialData;
                const p = JSON.parse(s);
                if (!p.categories || p.categories.length < 10) p.categories = initialData.categories;
                if (!p.groups) p.groups = initialData.groups;
                if (p.assets) p.assets = p.assets.map(a => ({
                    ...a,
                    initialBalance: a.initialBalance !== undefined ? a.initialBalance : 0,
                    groupId: a.groupId || ''
                }));
                return p;
            });
            const [user, setUser] = useState(null);
            const [fbConfig, setFbConfig] = useState(() => JSON.parse(localStorage.getItem(FIREBASE_CONFIG_KEY) || 'null'));
            const [tab, setTab] = useState('transactions');
            const [showModal, setShowModal] = useState(false);
            const [edit, setEdit] = useState(null);

            // For Dashboard Asset editing
            const [showAssetModal, setShowAssetModal] = useState(false);
            const [editAsset, setEditAsset] = useState(null);

            const [sidebarOpen, setSidebarOpen] = useState(false);

            const syncToCloud = (newData) => {
                if (user && window.firebase && firebase.apps.length) {
                    const sharedId = localStorage.getItem(SHARED_ID_KEY);
                    if (sharedId) {
                        firebase.firestore().collection('shared_data').doc(sharedId).set(newData).catch(err => console.error("Firebase Sync Error:", err));
                    } else {
                        firebase.firestore().collection('users').doc(user.uid).set(newData).catch(err => console.error("Firebase Sync Error:", err));
                    }
                }
            };

            useEffect(() => {
                if (!fbConfig || !window.firebase) return;
                if (!firebase.apps.length) firebase.initializeApp(fbConfig);
                const unsubscribe = firebase.auth().onAuthStateChanged(u => {
                    setUser(u);
                    if (u) {
                        const sharedId = localStorage.getItem(SHARED_ID_KEY);
                        if (sharedId) {
                            firebase.firestore().collection('shared_data').doc(sharedId).get().then(d => {
                                if (d.exists) setData(d.data());
                            });
                        } else {
                            firebase.firestore().collection('users').doc(u.uid).get().then(d => {
                                if (d.exists) setData(d.data());
                            });
                        }
                    }
                });
                return () => unsubscribe();
            }, [fbConfig]);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                if (window.lucide) window.lucide.createIcons();
            }, [data]);

            const menuClick = (t) => {
                if (t === 'settings') {
                    const pw = prompt('설정 페이지에 진입하려면 비밀번호를 입력하세요.');
                    const storedPw = localStorage.getItem(PASSWORD_KEY) || DEFAULT_PASSWORD;
                    if (pw !== storedPw) { alert('비밀번호가 올바르지 않습니다.'); return; }
                }
                setTab(t);
                setSidebarOpen(false);
            };

            const tabTitles = {
                dashboard: '대시보드',
                transactions: '거래 내역',
                assets: '자산 현황',
                settings: '설정'
            };

            return (
                <React.Fragment>
                    <div className="mobile-header">
                        <button onClick={() => setSidebarOpen(true)} style={{ background: 'transparent', color: 'white', padding: '0.4rem' }}><Icon name="menu" size={24} /></button>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flex: 1 }}>
                            <Icon name={tab === 'dashboard' ? 'layout-dashboard' : tab === 'transactions' ? 'list' : tab === 'assets' ? 'wallet' : 'settings'} size={24} className="mobile-hide" />
                            <h2>{tabTitles[tab] || 'Smart Finance'}</h2>
                        </div>
                        <button onClick={() => location.reload()} style={{ background: 'transparent', color: 'white', padding: '0.4rem' }}><Icon name="refresh-cw" size={24} /></button>
                    </div>
                    <div className={`mobile-overlay ${sidebarOpen ? 'visible' : ''}`} onClick={() => setSidebarOpen(false)}></div>
                    <div className={`sidebar ${sidebarOpen ? 'mobile-open' : ''}`}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '2rem' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}><Icon name="activity" size={24} /><h2>Smart Finance</h2></div>
                            <button className="mobile-only" onClick={() => setSidebarOpen(false)} style={{ background: 'transparent', color: 'white', display: window.innerWidth <= 768 ? 'block' : 'none' }}><Icon name="x" size={24} /></button>
                        </div>
                        <div className={`nav-item ${tab === 'dashboard' ? 'active' : ''}`} onClick={() => menuClick('dashboard')}><Icon name="layout-dashboard" /> 대시보드</div>
                        <div className={`nav-item ${tab === 'transactions' ? 'active' : ''}`} onClick={() => menuClick('transactions')}><Icon name="list" /> 거래 내역</div>
                        <div className={`nav-item ${tab === 'assets' ? 'active' : ''}`} onClick={() => menuClick('assets')}><Icon name="wallet" /> 자산 현황</div>
                        <div className={`nav-item ${tab === 'settings' ? 'active' : ''}`} onClick={() => menuClick('settings')}><Icon name="settings" /> 설정</div>
                        <div className="user-profile">{user ? <button onClick={() => firebase.auth().signOut()} className="auth-btn" style={{ background: 'transparent', color: '#8b949e' }}><Icon name="log-out" size={16} /> 로그아웃</button> : <button className="auth-btn login" onClick={() => { if (!fbConfig) setTab('settings'); else firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }}><Icon name="log-in" size={16} /> 로그인</button>}</div>
                    </div>
                    <div className="main-content"><div className="container">
                        {tab === 'dashboard' && <Dashboard data={data} setEdit={setEdit} setShowModal={setShowModal} setEditAsset={setEditAsset} setShowAssetModal={setShowAssetModal} />}
                        {tab === 'transactions' && <TransactionPage data={data} setData={setData} setEdit={setEdit} setShowModal={setShowModal} syncToCloud={syncToCloud} />}
                        {tab === 'assets' && <AssetManagementPage data={data} />}
                        {tab === 'settings' && <Settings data={data} setData={setData} fbConfig={fbConfig} setFbConfig={setFbConfig} syncToCloud={syncToCloud} />}
                    </div></div>
                    {showModal && <TransactionModal data={data} setData={setData} onClose={() => { setShowModal(false); setEdit(null); }} editItem={edit} syncToCloud={syncToCloud} />}
                    {showAssetModal && <AssetModal data={data} setData={setData} onClose={() => { setShowAssetModal(false); setEditAsset(null); }} editItem={editAsset} syncToCloud={syncToCloud} />}
                </React.Fragment>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
